name: Hattrick Eventi APP Scraper

on:
  workflow_dispatch:  
  schedule:
    - cron: '0 */6 * * *'  # Esegue ogni 8 ore (es. 00:00, 08:00, 16:00 UTC)# Solo esecuzione manuale dal pannello Actions

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository with custom token
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.ACTIONS_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install cloudscraper beautifulsoup4

      - name: Run Hattrick Scraper
        env:
          GITHUB_WORKSPACE: ${{ github.workspace }}
        run: |
          python hattrickeventi.py

      - name: Commit and push updated M3U8 files
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add hattrick.m3u8
          git commit -m "Aggiornato file M3U8 con nuovi flussi" || echo "Nessun cambiamento da committare"
          git push
        continue-on-error: true
